apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fine-app-ingress
  namespace: fine-app
  annotations:
    kubernetes.io/ingress.class: nginx
    # /api, /ai prefix 제거 후 각 서비스로 전달
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    # WebSocket 지원 (AI 서비스)
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  rules:
    - host: yourdomain.com   # 실제 도메인으로 변경
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /ai(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ai
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
